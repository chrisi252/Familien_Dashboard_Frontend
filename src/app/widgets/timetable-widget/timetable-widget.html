<div class="@container flex flex-col h-full gap-2 overflow-hidden">

  <app-loading-state [loading]="isLoading()" [error]="errorMessage()">

    <app-timetable-person-tabs
      [familyMembers]="familyMembers()"
      [persons]="persons()"
      [selectedPerson]="selectedPerson()"
      [showDeletePersonConfirm]="showDeletePersonConfirm()"
      [canEdit]="canEdit()"
      (personSelected)="selectPerson($event)"
      (deletePersonRequested)="showDeletePersonConfirm.set($event)"
      (deletePersonConfirmed)="deleteAllEntriesForPerson($event)"
      (addEntryRequested)="openAddForm()" />

    @if (isLoadingEntries()) {
      <div class="flex justify-center items-center flex-1">
        <span class="loading loading-spinner loading-sm"></span>
      </div>
    } @else if (entries().length === 0) {
      <div class="flex flex-col items-center justify-center flex-1 opacity-40 gap-1 text-sm">
        @if (selectedPerson() === ALL_PERSONS) {
          <span>Noch keine Stundenplaneinträge vorhanden</span>
        } @else {
          <span>Kein Stundenplan für {{ selectedPerson() }}</span>
        }
        @if (canEdit()) {
          <button class="btn btn-xs btn-ghost" (click)="openAddForm()">Eintrag hinzufügen</button>
        }
      </div>
    } @else {

      <app-timetable-mobile-view
        class="flex @2xl:hidden flex-col gap-2 flex-1 overflow-hidden"
        [entriesByDay]="entriesByDay()"
        [weekdays]="weekdays"
        [selectedDay]="selectedDay()"
        [selectedPerson]="selectedPerson()"
        [canEdit]="canEdit()"
        (daySelected)="selectedDay.set($event)"
        (editEntry)="openEditForm($event)"
        (deleteEntry)="deleteEntry($event)" />

      <app-timetable-desktop-view
        class="hidden @2xl:block overflow-x-auto flex-1"
        [entriesByDay]="entriesByDay()"
        [weekdays]="weekdays"
        [selectedPerson]="selectedPerson()"
        [canEdit]="canEdit()"
        (editEntry)="openEditForm($event)"
        (deleteEntry)="deleteEntry($event)" />

    }

    @if (showAddForm()) {
      <app-timetable-form
        [familyMembers]="familyMembers()"
        [persons]="persons()"
        [editingEntry]="editingEntry()"
        [initialForm]="form()"
        (saved)="saveEntry($event)"
        (cancelled)="closeForm()" />
    }

  </app-loading-state>

</div>
