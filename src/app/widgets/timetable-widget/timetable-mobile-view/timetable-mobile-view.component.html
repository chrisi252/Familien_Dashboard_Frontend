<div class="flex flex-col gap-2 flex-1 overflow-hidden">
  <div class="flex gap-1">
    @for (day of weekdays(); track day; let i = $index) {
      <button
        class="btn btn-xs flex-1"
        [class.btn-primary]="selectedDay() === i"
        [class.btn-ghost]="selectedDay() !== i"
        (click)="daySelected.emit(i)">
        {{ day }}
        @if (entriesByDay()[i].length > 0) {
          <span class="badge badge-xs ml-0.5">{{ entriesByDay()[i].length }}</span>
        }
      </button>
    }
  </div>

  <div class="overflow-y-auto flex-1 flex flex-col gap-1.5 pr-0.5">
    @if (entriesByDay()[selectedDay()].length === 0) {
      <div class="flex items-center justify-center flex-1 opacity-40 text-sm">
        Keine Einträge
      </div>
    } @else {
      @for (entry of entriesByDay()[selectedDay()]; track entry.id) {
        <app-timetable-entry-card
          [entry]="entry"
          [showPerson]="selectedPerson() === ALL_PERSONS"
          [canEdit]="canEdit()"
          [inlinedActions]="true"
          (editRequested)="editEntry.emit($event)"
          (deleteRequested)="deleteEntry.emit($event)" />
      }
    }
  </div>
</div>
