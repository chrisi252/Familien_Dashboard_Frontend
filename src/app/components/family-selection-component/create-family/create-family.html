<div class="flex h-screen items-center justify-center bg-base-200">

    <div class="absolute top-4 left-4">
        <app-theme-switch-component></app-theme-switch-component>
    </div>

    <div class="glass-wrapper h-auto max-w-lg">
        <div class="glass-card">
            <h2 class="text-3xl font-bold mb-2 text-base-content">Bennenen sie ihre Familie</h2>
            <p class="text-base-content mb-6">Erstellen sie eine neue Familie und laden sie andere Mitglieder ein.</p>
            @if (errorMessage) {
              <div class="mb-4">
                <app-alert-banner [message]="errorMessage" type="error" />
              </div>
            }

            <div class="flex flex-col gap-4">
                <div class="input-floating-container mb-2">
                    <input
                        id="createFamily"
                        type="text"
                        placeholder="Enter your family name"
                        [(ngModel)]="familyName"
                        class="input-floating" />
                    <label for="createFamily" class="label-floating">Familienname</label>
                </div>
                <button
                    (click)="tryCreateFamily()"
                    [disabled]="isLoading"
                    class="btn-premium">
                    @if(isLoading) {
                        <span class="loading loading-spinner loading-sm"></span>
                    }
                    Familie erstellen
                </button>

                <div class="divider"></div>

                <div class="text-center">
                    <button
                        (click)="onCancel()"
                        class="link link-hover text-sm text-base-content font-semibold">
                        Zurück zum Login
                    </button>
                </div>
            </div>
        </div>
    </div>
