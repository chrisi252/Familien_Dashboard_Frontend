<div class="flex h-screen items-center justify-center bg-base-200">

  <div class="absolute top-4 left-4">
    <app-theme-switch-component></app-theme-switch-component>
  </div>

  <div class="glass-wrapper h-auto max-w-lg">
    <div class="glass-card">
      <h2 class="text-3xl font-bold mb-2 text-base-content">Familie beitreten</h2>
      <p class="text-base-content mb-6">
        Gib den 6-stelligen Einladungscode ein, den dir ein Familienadmin gegeben hat.
      </p>

      @if (errorMessage()) {
        <div class="mb-4">
          <app-alert-banner [message]="errorMessage()" type="error" />
        </div>
      }

      <div class="flex flex-col gap-4">
        <div class="input-floating-container mb-2">
          <input
            type="text"
            placeholder="z.B. X7K2BN"
            [(ngModel)]="inviteCode"
            (input)="inviteCode = inviteCode.toUpperCase()"
            maxlength="6"
            class="input-floating text-center tracking-widest text-xl font-mono uppercase"
            (keyup.enter)="tryJoinByCode()" />
          <label class="label-floating">Einladungscode</label>
        </div>

        <button
          (click)="tryJoinByCode()"
          [disabled]="isLoading()"
          class="btn-premium">
          @if (isLoading()) {
            <span class="loading loading-spinner loading-sm"></span>
          }
          Beitreten
        </button>

        <div class="divider"></div>

        <div class="text-center">
          <button (click)="onCancel()" class="link link-hover text-sm text-base-content font-semibold">
            Zurück
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
