<div class="flex flex-col gap-6 max-w-md">
  <div>
    <h1 class="text-2xl font-bold">Admin-Account erstellen</h1>
    <p class="text-sm opacity-60 mt-1">Erstellt einen neuen Benutzer mit System-Admin-Rechten.</p>
  </div>

  <app-alert-banner [message]="successMessage()" type="success" />
  <app-alert-banner [message]="errorMessage()" type="error" />

  <div class="glass-wrapper h-auto">
    <div class="glass-card gap-4">

      <div class="input-floating-container">
        <input class="input-floating" [ngModel]="username()" (ngModelChange)="username.set($event)"
          placeholder="admin2" autocomplete="off" />
        <label class="label-floating">Benutzername *</label>
      </div>

      <div class="input-floating-container">
        <input type="password" class="input-floating" [ngModel]="password()" (ngModelChange)="password.set($event)"
          placeholder="Mind. 8 Zeichen" autocomplete="new-password" />
        <label class="label-floating">Passwort *</label>
      </div>

      <div class="flex flex-col sm:flex-row gap-3">
        <div class="input-floating-container flex-1">
          <input class="input-floating" [ngModel]="firstName()" (ngModelChange)="firstName.set($event)"
            placeholder="Vorname" />
          <label class="label-floating">Vorname</label>
        </div>
        <div class="input-floating-container flex-1">
          <input class="input-floating" [ngModel]="lastName()" (ngModelChange)="lastName.set($event)"
            placeholder="Nachname" />
          <label class="label-floating">Nachname</label>
        </div>
      </div>

      <div class="flex justify-end pt-2">
        <button class="btn-premium"
          [disabled]="isSaving() || !username().trim() || !password().trim()"
          (click)="submit()">
          @if (isSaving()) {
            <span class="loading loading-spinner loading-sm"></span>
          }
          Account erstellen
        </button>
      </div>
    </div>
  </div>
</div>
