<div class="w-72 min-h-full bg-base-200 text-base-content flex flex-col shadow-2xl z-50">

  <div class="p-6 flex items-center gap-4 border-b border-base-300">
    <div>
      <h2 class="font-bold text-lg leading-tight">System Admin</h2>
      <span class="text-xs opacity-70 font-medium tracking-wide uppercase">Systemverwaltung</span>
    </div>
  </div>

  <ul class="menu flex-1 px-4 py-6 gap-2 text-base">

    <li class="rounded-lg" routerLinkActive="bg-primary text-primary-content" [routerLinkActiveOptions]="{ exact: true }">
      <a routerLink="/systemadmin/users" class="flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
        </svg>
        Benutzer verwalten
      </a>
    </li>

    <li class="rounded-lg" routerLinkActive="bg-primary text-primary-content" [routerLinkActiveOptions]="{ exact: true }">
      <a routerLink="/systemadmin/families" class="flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
        Familien verwalten
      </a>
    </li>

    <li class="rounded-lg" routerLinkActive="bg-primary text-primary-content" [routerLinkActiveOptions]="{ exact: true }">
      <a routerLink="/systemadmin/accounts" class="flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Admin-Account erstellen
      </a>
    </li>

  </ul>

  <div class="p-4 border-t border-base-300 bg-base-200/50">
    <a routerLink="/login" class="btn btn-ghost btn-block justify-start text-error hover:bg-error/10">
      Abmelden
    </a>
  </div>

</div>
