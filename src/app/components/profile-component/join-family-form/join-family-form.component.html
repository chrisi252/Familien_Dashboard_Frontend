<section class="card bg-base-100 shadow-xl border border-base-300">
  <div class="card-body">
    <h2 class="card-title text-xl mb-2">Einer Familie beitreten</h2>
    <p class="text-sm opacity-60 mb-3">Gib den Beitrittscode der Familie ein, der du beitreten möchtest.</p>

    <div class="flex gap-2">
      <input
        type="text"
        class="input input-bordered flex-1"
        placeholder="Beitrittscode"
        [(ngModel)]="code"
        (keyup.enter)="submit()"
        maxlength="6"
        autocomplete="off" />
      <button
        type="button"
        class="btn btn-primary"
        (click)="submit()"
        [disabled]="loading()">
        @if (loading()) {
          <span class="loading loading-spinner loading-sm"></span>
        } @else {
          Beitreten
        }
      </button>
    </div>

    @if (error()) {
      <div class="alert alert-error mt-3">{{ error() }}</div>
    }
    @if (success()) {
      <div class="alert alert-success mt-3">Erfolgreich beigetreten!</div>
    }
  </div>
</section>
