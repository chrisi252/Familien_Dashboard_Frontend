<div class="min-h-screen bg-base-200">
  <app-header-component></app-header-component>

  <main class="max-w-3xl mx-auto px-4 py-6 flex flex-col gap-6">

    <app-profile-info
      [user]="user()"
      [isLoading]="isLoading()"
      [error]="errorMessage()"
      (reload)="loadProfile()"
      (goToLogin)="goToLogin()"
      (goToDashboard)="goToDashboard()" />

    <app-family-list
      [families]="families()"
      [familiesLoading]="familiesLoading()"
      [deletingFamilyId]="deletingFamilyId()"
      [deleteError]="deleteError()"
      [deleteLoading]="deleteLoading()"
      (familySelected)="selectFamily($event)"
      (deleteRequested)="startDeleteFamily($event)"
      (deleteConfirmed)="confirmDeleteFamily()"
      (deleteCancelled)="cancelDelete()" />

    <app-join-family-form
      [loading]="joinLoading()"
      [error]="joinError()"
      [success]="joinSuccess()"
      (codeSubmitted)="joinFamily($event)" />

  </main>
</div>
